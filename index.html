<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <meta http-equiv="Content-Language" content="pt-BR">
  <title>OrientaMe — Gestão de Orientações Acadêmicas</title>
  <meta name="description" content="Plataforma inteligente de gestão de orientações acadêmicas para pós-graduação">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a10; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; background: #0a0a10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999; transition: opacity 0.4s ease;
    }
    #loading .logo { font-size: 48px; animation: pulse 1.5s ease infinite; }
    #loading .text { font-family: 'Playfair Display', serif; font-size: 24px; color: #c9a84c; font-weight: 900; }
    #loading .sub { font-size: 13px; color: #8a8799; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">🎓</div>
    <div class="text">OrientaMe</div>
    <div class="sub">Carregando...</div>
  </div>
  <div id="root"></div>

  <!-- React via CDN -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Mammoth para leitura de DOCX -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script>window.mammoth = mammoth;</script>

  <!-- PDF.js -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

  <!-- App compilado -->
  <script src="app.js"></script>

  <!-- Montar o app -->
  <script>
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(window.__OrientaMe));
      setTimeout(() => {
        const l = document.getElementById('loading');
        if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
      }, 800);
    } catch(e) {
      document.getElementById('loading').innerHTML = '<div style="color:#e05c5c;font-family:monospace;padding:20px;max-width:600px;text-align:center"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:14px">Erro ao inicializar: ' + e.message + '</div></div>';
      console.error(e);
    }
  </script>
</body>
</html>
